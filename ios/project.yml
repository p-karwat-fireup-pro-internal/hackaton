name: FieldNotebook
options:
  bundleIdPrefix: dev.zaniewicz
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: pl
configs:
  Debug: debug
  Debug-Local: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  FieldNotebook:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FieldNotebook
    resources:
      - path: FieldNotebook/Resources/Assets.xcassets
      - path: FieldNotebook/Resources/Fonts
    info:
      path: FieldNotebook/Resources/Info.plist
      properties:
        CFBundleDisplayName: Field Notebook
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSFaceIDUsageDescription: "Odblokuj aplikację, żeby zobaczyć dzisiejsze zlecenia."
        NSPhotoLibraryUsageDescription: "Wybierz zdjęcie dokumentujące zlecenie."
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
        CFBundleLocalizations: ["pl"]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.zaniewicz.fieldnotebook
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
        Debug-Local:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG_LOCAL"
        Release: {}
  FieldNotebookTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FieldNotebookTests
    dependencies:
      - target: FieldNotebook
