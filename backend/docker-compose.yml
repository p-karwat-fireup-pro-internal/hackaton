services:
  backend:
    build: .
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_PATH: /data/app.db
      PHOTOS_PATH: /data/photos
      PORT: "3000"
    volumes:
      - field-notebook-data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  field-notebook-data:
